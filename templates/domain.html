<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Other Domains | ASTours International</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #f0f4f8, #d9e2ec);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #333;
    }

    .nav-bar {
      display: flex;
      justify-content: flex-start;
      padding: 1rem 2rem;
      background-color: transparent;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-button {
      background: #007bff;
      color: #fff;
      padding: 0.7rem 1.4rem;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
    }

    .nav-button:hover {
      background-color: #0056b3;
      transform: translateY(-2px);
    }

    .content {
      flex: 1;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #007bff;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      max-width: 700px;
      margin: 0 auto 2rem;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .button {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #007bff, #00bfff);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      min-width: 220px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 12px rgba(0, 123, 255, 0.2);
    }

    .button:hover {
      background: linear-gradient(135deg, #0069d9, #00aaff);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
    }

    footer {
      background: #222;
      color: #fff;
      padding: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }

    .instagram {
      color: #00bfff;
      text-decoration: none;
      font-weight: bold;
    }

    .instagram:hover {
      color: #66d9ff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .button {
        min-width: 80%;
      }
    }
  </style>
</head>
<body>

  <div class="nav-bar">
    <a class="nav-button" href="javascript:history.back()">← Back</a>
  </div>

  <div class="content">
    <h1>Explore Our Other Domains</h1>
    <p>We offer a wide range of services to meet all your travel and lifestyle needs. Choose a category to explore more.</p>

    <div class="button-container">
      <button class="button" onclick="location.href='astours.html'">Travel Services</button>
      <button class="button" onclick="location.href='Education/travel_skill.html'">Skills</button>
      <button class="button" onclick="location.href='otherservices.html'">Politics</button>
    </div>
    <div class="button-container">
      <button class="button" onclick="location.href='astourinternational.html'">Finance</button>
      <button class="button" onclick="location.href='otherservices.html'">Ecommerce</button>
      <button class="button" onclick="location.href='otherservices.html'">Fitness</button>
    </div>
    <div class="button-container">
      <button class="button" onclick="location.href='astourinternational.html'">Education</button>
      <button class="button" onclick="location.href='../business/business.html'">Business</button>
      <button class="button" onclick="location.href='otherservices.html'">Lifestyle</button>
    </div>
  </div>

  <footer>
    Follow us on Instagram: 
    <a href="https://instagram.com/astourinternational" class="instagram" target="_blank">@astourinternational</a>
  </footer>

</body>
</html>
