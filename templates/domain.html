<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Domains</title>
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(180deg, #f8f9fa, #e3eaf2);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent; /* Removed blue background */
            padding: 15px 20px;
            border-radius: 10px;
            width: 90%;
            margin: 10px auto;
            z-index: 1000;
        }

        .nav-button {
            display: inline-block;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: #333; /* Changed text color to dark */
            background: #f0f0f0; /* Light grey for better contrast */
            border-radius: 30px;
            transition: all 0.3s ease-in-out;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            background: #d6d6d6;
            transform: scale(1.05);
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-top: 30px;
            font-weight: 600;
        }

        p {
            font-size: 18px;
            color: #555;
            max-width: 700px;
            margin: 10px auto;
            line-height: 1.6;
        }

        /* Button Section */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .button {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease-in-out;
            min-width: 260px;
        }

        .button:hover {
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
            transform: translateY(-3px);
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        footer {
            padding: 20px;
            background: #222;
            color: #fff;
            font-size: 16px;
            border-radius: 10px;
            margin-top: auto;
        }

        .instagram {
            color: #ff4b2b;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .instagram:hover {
            color: #ff416c;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                text-align: center;
            }

            .nav-button {
                margin-bottom: 10px;
                width: 90%;
            }
        }
        .button {
            background: #007bff; /* Soft blue */
            color: white;
            padding: 14px 35px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        
        .button:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0px 5px 12px rgba(0, 123, 255, 0.3);
        }
        
    </style>
</head>
<body>

    <!-- Navigation Bar with Home & Back Buttons -->
    <div class="nav-bar">
        <a class="nav-button" href="javascript:history.back()">🔙 Back</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>Welcome to Our Services</h1>
        <p>Your one-stop solution for Visa Services, City Tours, and Car Rentals.</p>

        <!-- Service Buttons -->
        <div class="button-container">
            <button class="button" onclick="location.href='astourinternational.html'">Tour Service</button>
            <button class="button" onclick="location.href='Education/travel_skill.html'">Skills</button>
            <button class="button" onclick="location.href='otherservices.html'">Politics</button>
        </div>
        <div class="button-container">
            <button class="button" onclick="location.href='astourinternational.html'">Finance</button>
            <button class="button" onclick="location.href='otherservices.html'">Ecommerce</button>
            <button class="button" onclick="location.href='otherservices.html'">Fitness</button>
        </div>
        <div class="button-container">
            <button class="button" onclick="location.href='astourinternational.html'">Education</button>
            <button class="button" onclick="location.href='otherservices.html'">Business</button>
            <button class="button" onclick="location.href='otherservices.html'">Fitness</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        Follow us on Instagram: 
        <a href="https://instagram.com/astourinternational" class="instagram" target="_blank">@astourinternational</a>
    </footer>

</body>
</html>
