<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Solo2CEO Admin</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f1f5f9;
      font-family: Arial, sans-serif;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input[type="password"] {
      padding: 10px;
      width: 100%;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Solo2CEO Admin Login</h2>
    <input type="password" id="password" placeholder="Enter password" />
    <button onclick="checkPassword()">Login</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    const correctPassword = atob('YWRtaW4yMDI1'); // base64 = "yourpassword"

    function checkPassword() {
      const input = document.getElementById('password').value;
      if (input === correctPassword) {
        window.location.href = "login.html";
      } else {
        document.getElementById('errorMsg').innerText = "Incorrect password.";
      }
    }
  </script>
</body>
</html>
