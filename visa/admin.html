<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visa Data Admin Panel</title>
  <link rel="icon" type="image/png" href="../image/astourlogo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(135deg, #ece9e6, #ffffff); 
      font-family: 'Segoe UI', sans-serif; 
    }
    h2 {
      font-weight: 700;
      letter-spacing: 1px;
      color: #2c3e50;
    }
    .card {
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }
    .country-name {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      color: #34495e;
    }
    .country-name img {
      width: 35px;
      height: 24px;
      border-radius: 6px;
      object-fit: cover;
      margin-right: 10px;
      border: 1px solid #ddd;
    }
    .info-line {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 6px;
    }
    .info-line i {
      color: #007bff;
      margin-right: 6px;
    }
    .btn-custom {
      border-radius: 10px;
      font-weight: 500;
      padding: 6px 12px;
    }
    .search-box input {
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .nav-tabs .nav-link {
      border-radius: 10px 10px 0 0;
      font-weight: 600;
      color: #495057;
    }
    .nav-tabs .nav-link.active {
      background: #007bff;
      color: white;
    }

      /* Password overlay */
    #passwordOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #passwordOverlay input {
      padding: 12px;
      border-radius: 5px;
      border: none;
      width: 250px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    #passwordOverlay button {
      padding: 10px 20px;
      background: #ffa726;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    #passwordOverlay p {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
     <!-- Password Prompt Overlay -->
  <div id="passwordOverlay">
    <input type="password" id="adminPassword" placeholder="Enter Password" />
    <button onclick="checkPassword()">Unlock</button>
    <p id="errorMessage"></p>
  </div>
  <div class="container py-4">
    <h2 class="text-center mb-4">🌍 Visa Data Admin Panel</h2>

    <!-- Navigation Tabs -->
    <ul class="nav nav-tabs justify-content-center mb-4" id="sheetTabs">
      <li class="nav-item">
        <button class="nav-link active" data-sheet="main">🌐 Main Visa Data</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-sheet="schengen">🇪🇺 Schengen 29 Countries</button>
      </li>
    </ul>
    <!-- Tabs -->
<ul class="nav nav-tabs justify-content-center mb-4" id="sheetTabs">
  <li class="nav-item">
    <button class="nav-link active" data-sheet="main">🌐 Main Visa Data</button>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="adminvisadatabase.html">
      📄 Add VisaDatabase.json
    </a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="adminvisaquote.html">
      📄 Visa Quotations
    </a>
  </li>
</ul>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search country...">
    </div>

    <!-- Cards -->
    <div id="cardsContainer" class="row g-4 mt-3"></div>
  </div>

<!-- Add PapaParse library -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
    // Sheet URLs
    const sheets = {
      main: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlxPfTzCMV6uTWORDivHZ01Zh_XKENWEVXybN0qK__KzkbccW7Z1Kntth6XlZtWAzUdGtF9YOJM6Fe/pub?output=csv",
      schengen: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlxPfTzCMV6uTWORDivHZ01Zh_XKENWEVXybN0qK__KzkbccW7Z1Kntth6XlZtWAzUdGtF9YOJM6Fe/pub?gid=1635340433&single=true&output=csv"
    };

    let visaData = [];
    let activeSheet = "main";

    // Fetch & Parse CSV
    async function fetchVisaData(sheetKey) {
      try {
        const res = await fetch(sheets[sheetKey]);
        const csvText = await res.text();
        visaData = parseCSV(csvText);
        renderCards(visaData);
      } catch (error) {
        console.error("Error fetching data:", error);
      }
    }

    // Parse CSV into JSON
    function parseCSV(csv) {
  const rows = csv
    .split("\n")
    .map(row => row.match(/(".?"|[^",]+)(?=\s,|\s*$)/g)); // ✅ handles commas inside quotes

  if (!rows || rows.length < 2) return [];

  const headers = rows[0].map(h => h.replace(/^"|"$/g, "").trim());
  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = row[i] ? row[i].replace(/^"|"$/g, "").trim() : "";
    });
    return obj;
  }).filter(r => r["Countries"]);
}


    // Render Cards
    function renderCards(data) {
      const container = document.getElementById("cardsContainer");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = <p class="text-center text-muted">No data found</p>;
        return;
      }

      data.forEach(row => {
        const card = document.createElement("div");
        card.className = "col-md-4";

        card.innerHTML = `
          <div class="card h-100 p-3">
            <h5 class="country-name">
              <img src="https://flagcdn.com/w40/${(row["Code"] || "").toLowerCase()}.png" alt="flag">
              ${row["Countries"]}
            </h5>
            <p class="info-line"><i class="fa-solid fa-coins"></i><strong>Fees:</strong> ${row["Visa Fees"] || "N/A"}</p>
            <p class="info-line"><i class="fa-solid fa-file-invoice"></i><strong>Service Charge:</strong> ${row["Service Charge"] || "N/A"}</p>
            <p class="info-line"><i class="fa-solid fa-shield-halved"></i><strong>Insurance:</strong> ${row["Insurance"] || "N/A"}</p>
            <p class="info-line"><i class="fa-solid fa-building-columns"></i><strong>VFS Fees:</strong> ${row["Vfs Fees"] || "N/A"}</p>
            ${row["Links"] ? `<a href="${row["Links"]}" target="_blank" class="btn btn-sm btn-primary btn-custom">
              <i class="fa-solid fa-link"></i> Official Link</a>` : ""}
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Search Filter
    document.getElementById("searchInput").addEventListener("input", (e) => {
      const searchText = e.target.value.toLowerCase();
      const filtered = visaData.filter(row =>
        row["Countries"].toLowerCase().includes(searchText)
      );
      renderCards(filtered);
    });

    // Tab Switch
    document.querySelectorAll("#sheetTabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#sheetTabs button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeSheet = btn.getAttribute("data-sheet");
        fetchVisaData(activeSheet);
        document.getElementById("searchInput").value = ""; // reset search
      });
    });

    // Load default sheet
    fetchVisaData("main");
  </script>
</body>
<script>

  // Base64-encoded password:
  const encoded = 'Sm91cm5leUAyNQ==';

  function checkPassword() {
    const input = document.getElementById("adminPassword").value;
    const correctPassword = atob(encoded); // Decode from Base64

    if (input === correctPassword) {
      document.getElementById("passwordOverlay").style.display = "none";
      document.querySelector("header").classList.add("visible");
      document.querySelector(".container").classList.add("visible");
      document.querySelector("footer").classList.add("visible");
    } else {
      document.getElementById("errorMessage").textContent = "Incorrect password. Try again.";
    }
  }
</script>
</html>
